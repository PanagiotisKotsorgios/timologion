# ═══════════════════════════════════════════════════════════════════════
#   timologion — one-click Coolify deployment
# ═══════════════════════════════════════════════════════════════════════
#
# This compose file uses Coolify's "magic environment variables" so that
# nothing needs to be manually configured on the first deploy:
#
#   SERVICE_FQDN_APP        → the hostname Coolify assigns (e.g. timologion.gr)
#   SERVICE_URL_APP         → the full URL with scheme (e.g. https://timologion.gr)
#   SERVICE_PASSWORD_*      → random 64-char password generated once and
#                             persisted for the lifetime of the resource
#   SERVICE_PASSWORD_64_*   → same, 64 characters explicitly
#
# Coolify substitutes these before the containers start. Values are stable
# across restarts, so the DB password and session secret survive redeploys.
#
# Reference: https://coolify.io/docs/knowledge-base/docker/compose

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # ─── Core ──────────────────────────────────────────────────────
      # Points at the sibling MySQL container over the internal Docker
      # network. Coolify auto-generates the password once and persists it.
      - "DATABASE_URL=mysql://timologion:${SERVICE_PASSWORD_MYSQL}@mysql:3306/timologion"
      - "SESSION_SECRET=${SERVICE_PASSWORD_64_SESSION}"
      # APP_BASE_URL needs the full scheme+host (env is validated with .url()).
      # SERVICE_URL_APP includes the protocol; SERVICE_FQDN_APP does not.
      - "APP_BASE_URL=${SERVICE_URL_APP}"
      - "NODE_ENV=production"

      # ─── Initial admin (created on first boot only) ────────────────
      # Set these in Coolify → Environment Variables to auto-create your
      # super_admin account on the very first deploy. If INITIAL_ADMIN_PASSWORD
      # is left empty, a random one is generated and printed to the logs.
      - "INITIAL_ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL:-}"
      - "INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD:-}"
      - "INITIAL_ADMIN_NAME=${INITIAL_ADMIN_NAME:-Platform Admin}"

      # ─── Cron ───────────────────────────────────────────────────────
      - "CRON_SECRET=${SERVICE_PASSWORD_CRON}"

      # ─── Wrapp — staging by default. Override URL for production. ─
      - "WRAPP_API_BASE_URL=${WRAPP_API_BASE_URL:-https://staging.wrapp.ai/api/v1}"
      - "WRAPP_API_KEY=${WRAPP_API_KEY:-}"
      - "WRAPP_PARTNER_API_KEY=${WRAPP_PARTNER_API_KEY:-}"
      - "WRAPP_STAGING_TENANT_API_KEY=${WRAPP_STAGING_TENANT_API_KEY:-}"
      - "WRAPP_STAGING_TENANT_EMAIL=${WRAPP_STAGING_TENANT_EMAIL:-}"
      - "WRAPP_WEBHOOK_SECRET=${WRAPP_WEBHOOK_SECRET:-}"

      # ─── OAuth — leave empty to disable the buttons cleanly ───────
      - "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}"
      - "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}"
      - "FACEBOOK_APP_ID=${FACEBOOK_APP_ID:-}"
      - "FACEBOOK_APP_SECRET=${FACEBOOK_APP_SECRET:-}"

      # ─── Observability ─────────────────────────────────────────────
      - "SENTRY_DSN=${SENTRY_DSN:-}"

    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"
      interval: 15s
      timeout: 10s
      retries: 20
      # First-boot has to migrate the schema + seed plans + create admin
      # before Next.js starts listening. Give it plenty of runway.
      start_period: 180s

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      # Root credential. IMPORTANT: the magic-var name must not share a
      # prefix with `SERVICE_PASSWORD_MYSQL` or Coolify's parser leaves it
      # empty (treats them as duplicates). `SERVICE_PASSWORD_DBROOT` keeps
      # the two variables distinct.
      - "MYSQL_ROOT_PASSWORD=${SERVICE_PASSWORD_DBROOT}"
      - "MYSQL_DATABASE=timologion"
      - "MYSQL_USER=timologion"
      - "MYSQL_PASSWORD=${SERVICE_PASSWORD_MYSQL}"
    volumes:
      - "mysql-data:/var/lib/mysql"
    # Healthcheck uses the least-privilege `timologion` user instead of
    # root — if the app user can connect, MySQL is healthy AND the app's
    # credentials work, which is what actually matters for readiness.
    # CMD-SHELL is required so `$$MYSQL_PASSWORD` is expanded by the
    # container's shell at healthcheck runtime.
    healthcheck:
      test:
        - "CMD-SHELL"
        - "mysqladmin ping -h 127.0.0.1 -utimologion -p\"$$MYSQL_PASSWORD\" --silent"
      interval: 5s
      timeout: 10s
      retries: 60
      # MySQL 8 initdb + user creation on a fresh volume takes 20-40s on
      # typical Coolify hosts. Generous headroom so slow disks don't fail
      # the very first deploy.
      start_period: 90s

volumes:
  mysql-data:
